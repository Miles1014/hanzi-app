<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>汉字俄罗斯方块</title>
<script src="pinyin-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.0/dist/hanzi-writer.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#e8f0fe 0%,#fdf6f0 100%);color:#333;min-height:100vh;overflow:hidden;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit;border:none;outline:none;touch-action:manipulation}
input{font-family:inherit;outline:none}

/* 顶部栏 */
#topBar{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#fff;flex-shrink:0;min-height:44px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
#topBar .btn-back{background:#6c5ce7;color:#fff;padding:6px 16px;border-radius:20px;font-size:.85em;font-weight:bold;transition:all .2s}
#topBar .btn-back:hover{background:#5a4bd1}
.stat-group{display:flex;gap:14px;align-items:center}
.stat-item{text-align:center}
.stat-item .num{font-size:1.15em;font-weight:bold;color:#333}
.stat-item .lbl{font-size:.6em;color:#999}
.stat-item .num.elim{color:#2ecc71}
.stat-item .num.stacked{color:#e67e22}
#topBar .btn-settings{background:#f5f5f5;color:#888;width:30px;height:30px;border-radius:50%;font-size:.9em;display:flex;align-items:center;justify-content:center;transition:all .2s}

/* 游戏区 */
#gameArea{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:4px;overflow:hidden;min-height:0}
#canvasWrapper{position:relative;width:100%;height:auto;display:flex;align-items:flex-start;justify-content:center}
#gameCanvas{display:block;border-radius:12px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.06);width:auto;height:auto;max-width:100%}

/* 识别区提示 */
#recogHint{position:absolute;right:10px;top:40%;transform:translateY(-50%);background:rgba(255,255,255,0.85);padding:6px 10px;border-radius:8px;font-size:.7em;color:#a18cd1;pointer-events:none;display:none;box-shadow:0 1px 4px rgba(0,0,0,0.08);white-space:nowrap}
#recogHint.active{display:block}

/* 操作按钮 */
#controls{display:flex;align-items:center;justify-content:center;gap:24px;padding:8px 16px;flex-shrink:0;position:relative;z-index:10;transform:translateY(-3vh)}
.ctrl-btn{width:64px;height:64px;border-radius:50%;background:#f0f2ff;color:#6c5ce7;font-size:1.8em;display:flex;align-items:center;justify-content:center;transition:all .15s;touch-action:manipulation;font-weight:bold;border:2px solid #d5d0f5}
.ctrl-btn:active{background:#d5d0f5;transform:scale(.92)}
.ctrl-btn.disabled{opacity:.3;pointer-events:none}
.ctrl-btn.drop-btn{background:#fff0f0;color:#e74c3c;border-color:#f5c0c0}

/* 语音识别弹窗 - 跟随测验页风格 */
#voiceOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:none;align-items:center;justify-content:center}
#voiceOverlay.visible{display:flex}
.voice-box{background:#fff;border-radius:24px;padding:26px 22px;width:310px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.15)}
.voice-box .char{font-size:4em;font-weight:bold;color:#333;margin-bottom:4px}

.voice-box .hint{font-size:.85em;color:#999;margin-bottom:12px}
.voice-box .mic-icon{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#a18cd1,#fbc2eb);display:flex;align-items:center;justify-content:center;font-size:1.8em;margin:0 auto 8px;transition:all .3s;color:#fff;border:none;cursor:pointer;touch-action:manipulation}
.voice-box .mic-icon:active{transform:scale(.92)}
.voice-box .mic-icon.listening{animation:micPulse .6s infinite alternate;box-shadow:0 0 28px rgba(161,140,209,0.5)}
.voice-box .mic-icon.listening:active{transform:scale(1)}
@keyframes micPulse{from{transform:scale(1)}to{transform:scale(1.15)}}
.voice-box .status-text{font-size:.85em;color:#888;min-height:1.3em}
.voice-box .timer{font-size:1.8em;font-weight:bold;color:#a18cd1;margin-top:4px}
.voice-box .btn-skip{background:transparent;color:#bbb;padding:6px 16px;border-radius:10px;font-size:.8em;margin-top:8px;text-decoration:underline}
.voice-box .result-correct{color:#2ecc71;font-size:1.2em;font-weight:bold;margin-top:6px}
.voice-box .result-wrong{color:#e67e22;font-size:1.2em;font-weight:bold;margin-top:6px}

/* 书写弹窗 */
#writingOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:none;align-items:center;justify-content:center}
#writingOverlay.visible{display:flex}
.write-box{background:#fff;border-radius:24px;padding:20px;width:320px;max-width:90vw;text-align:center;color:#333;box-shadow:0 10px 40px rgba(0,0,0,0.15)}
.write-box h3{font-size:1.05em;color:#555;margin-bottom:2px}
.write-box .write-char{font-size:2.8em;font-weight:bold;color:#a18cd1;margin-bottom:4px}
.write-box .write-hint{font-size:.78em;color:#999;margin-bottom:8px}
#writeCanvas{width:200px;height:200px;border:2px solid #e8e8e8;border-radius:12px;margin:0 auto 8px;overflow:hidden}
.write-btn-group{display:flex;gap:10px;justify-content:center}
.write-btn{padding:8px 22px;border-radius:12px;font-size:.9em;font-weight:bold;transition:all .15s}
.write-btn.skip{background:#f0f0f0;color:#888}
.write-btn.confirm{background:#2ecc71;color:#fff;display:none}
.write-btn.confirm:disabled{background:#aaa;cursor:wait}
.write-btn.bonus-result{display:none;padding:10px 26px}
.write-btn.bonus-result.earned{background:#2ecc71;color:#fff;display:inline-block}
.write-btn.bonus-result.missed{background:#e74c3c;color:#fff;display:inline-block}

/* 游戏结束弹窗 */
#gameOverOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:center;justify-content:center}
#gameOverOverlay.visible{display:flex}
.go-box{background:#fff;border-radius:24px;padding:26px 22px;width:330px;max-width:90vw;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.15)}
.go-box h2{font-size:1.5em;color:#a18cd1;margin-bottom:2px}
.go-box .go-sub{font-size:.85em;color:#999;margin-bottom:12px}
.go-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.go-stat{background:#f8f9ff;border-radius:12px;padding:8px}
.go-stat .num{font-size:1.5em;font-weight:bold;color:#555}
.go-stat .num.elim{color:#2ecc71}
.go-stat .num.stacked{color:#e67e22}
.go-stat .lbl{font-size:.65em;color:#999}
.go-box .go-weak{font-size:.78em;color:#999;margin-bottom:10px;min-height:1.2em}
.go-btns{display:flex;gap:10px;justify-content:center}
.go-btn{padding:10px 26px;border-radius:14px;font-size:.95em;font-weight:bold;transition:all .2s}
.go-btn.primary{background:linear-gradient(135deg,#a18cd1,#fbc2eb);color:#fff}
.go-btn.secondary{background:#f0f0f0;color:#666}

/* 设置弹窗 */
#settingsOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;display:none;align-items:center;justify-content:center}
#settingsOverlay.visible{display:flex}
.settings-box{background:#fff;border-radius:24px;padding:20px;width:320px;max-width:90vw;color:#333;box-shadow:0 10px 40px rgba(0,0,0,0.15)}
.settings-box h3{font-size:1.1em;color:#555;margin-bottom:12px;text-align:center}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
.setting-row:last-child{border-bottom:none}
.setting-row .label{font-size:.85em;color:#666}
.setting-row .value{font-size:.85em;font-weight:bold}
.setting-row select{padding:4px 10px;border-radius:8px;border:1px solid #ddd;font-size:.82em;background:#fafafa}
.setting-row input[type=range]{width:90px}
.settings-btns{display:flex;gap:10px;margin-top:12px;justify-content:center}
.settings-btn{padding:8px 26px;border-radius:10px;font-size:.9em;font-weight:bold}
.settings-btn.save{background:#a18cd1;color:#fff}
.settings-btn.cancel{background:#f0f0f0;color:#666}

/* iPad 适配 */
@media(min-width:768px){
  #controls{gap:38px;padding:8px 20px}
  .ctrl-btn{width:68px;height:68px;font-size:1.8em}
  .voice-box{width:360px}
  .voice-box .char{font-size:5em}
  .write-box{width:360px}
}
</style>
</head>
<body>

<div id="topBar">
  <button class="btn-back" onclick="backToDashboard()">← 返回</button>
  <div class="stat-group">
    <div class="stat-item"><div class="num elim" id="elimCount">0</div><div class="lbl">消除</div></div>
    <div class="stat-item"><div class="num" id="scoreCount">0</div><div class="lbl">得分</div></div>
    <div class="stat-item"><div class="num stacked" id="stackedCount">0</div><div class="lbl">堆积</div></div>
  </div>
  <button class="btn-settings" onclick="openSettings()">⚙</button>
</div>

<div id="gameArea">
  <div id="canvasWrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="recogHint">识别中...</div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btnLeft" ontouchstart="moveLeft()" onclick="moveLeft()">⬅️</button>
  <button class="ctrl-btn drop-btn" id="btnDrop" ontouchstart="dropNow()" onclick="dropNow()">⏬</button>
  <button class="ctrl-btn" id="btnRight" ontouchstart="moveRight()" onclick="moveRight()">➡️</button>
</div>

<div id="voiceOverlay">
  <div class="voice-box">
    <div class="char" id="voiceChar">字</div>
    <div class="hint" id="voiceHint">点击🎤开始朗读</div>
    <button class="mic-icon" id="micIcon" onclick="startVoiceRecognition()">🎤</button>
    <div class="status-text" id="voiceStatus">点击麦克风开始</div>
    <div class="timer" id="voiceTimer" style="display:none">--</div>
    <div id="voiceResult"></div>
    <button class="btn-skip" id="voiceSkipBtn" onclick="skipVoice()">跳过 →</button>
  </div>
</div>

<div id="writingOverlay">
  <div class="write-box">
    <h3>✏️ 写一写 赚加分</h3>
    <div class="write-char" id="writeChar">字</div>
    <div class="write-hint">先看一遍笔顺，然后自己跟着写一遍</div>
    <div id="writeCanvas"></div>
    <div id="writeResult"></div>
    <div class="write-btn-group">
      <button class="write-btn skip" onclick="skipWriting()">跳过</button>
      <button class="write-btn confirm" id="writeConfirmBtn" onclick="submitWriting()">我写完了 ✓</button>
      <button class="write-btn bonus-result" id="writeDoneBtn" onclick="closeWritingAndContinue()">继续游戏</button>
    </div>
  </div>
</div>

<div id="gameOverOverlay">
  <div class="go-box">
    <h2>游戏结束</h2>
    <div class="go-sub" id="goUser">小朋友</div>
    <div class="go-stats">
      <div class="go-stat"><div class="num elim" id="goElim">0</div><div class="lbl">消除</div></div>
      <div class="go-stat"><div class="num" id="goScore">0</div><div class="lbl">总分</div></div>
      <div class="go-stat"><div class="num stacked" id="goStacked">0</div><div class="lbl">堆积</div></div>
    </div>
    <div class="go-weak" id="goWeak"></div>
    <div class="go-btns">
      <button class="go-btn primary" onclick="restartGame()">再来一局</button>
      <button class="go-btn secondary" onclick="backToDashboard()">返回首页</button>
    </div>
  </div>
</div>

<div id="settingsOverlay">
  <div class="settings-box">
    <h3>⚙ 游戏设置</h3>
    <div class="setting-row"><span class="label">下落速度</span><div><input type="range" id="setSpeed" min="1" max="5" value="3" oninput="updateSettingDisplay('speed')"><span class="value" id="setSpeedVal">中</span></div></div>
    <div class="setting-row"><span class="label">消除方式</span><select id="setMode"><option value="voice">仅语音</option><option value="both" selected>语音+书写加分</option></select></div>
    <div class="setting-row"><span class="label">选字范围</span><select id="setRange"><option value="mastered" selected>已掌握(≥80)</option><option value="weak">需复习(&lt;60)</option><option value="all">全部已学</option></select></div>
    <div class="setting-row"><span class="label">识别超时</span><select id="setTimeout"><option value="3">3 秒</option><option value="5" selected>5 秒</option><option value="8">8 秒</option><option value="10">10 秒</option></select></div>
    <div class="settings-btns"><button class="settings-btn cancel" onclick="closeSettings()">取消</button><button class="settings-btn save" onclick="saveSettings()">保存</button></div>
  </div>
</div>

<script>
// ============================================
// 拼音格式化
// ============================================
var TONE_MARKS={'1':'\u0304','2':'\u0301','3':'\u030C','4':'\u0300'};
function formatPinyin(py){
  if(!py)return'';
  var tone=py.match(/[0-4]$/);
  if(!tone)return py;
  var base=py.slice(0,-1),t=tone[0];
  if(t==='0'||t==='5')return base;
  var mark=TONE_MARKS[t],idx=-1;
  if(base.includes('a'))idx=base.lastIndexOf('a');
  else if(base.includes('e'))idx=base.lastIndexOf('e');
  else{for(var i=base.length-1;i>=0;i--){if('aeiouvAEIOUV'.indexOf(base[i])>=0){idx=i;break}}}
  if(idx<0)return base;
  var r=base.slice(0,idx)+base[idx]+mark+base.slice(idx+1);
  return r.replace(/v/g,'\u00FC').replace(/V/g,'\u00DC');
}

// ============================================
// 配置、状态
// ============================================
var COLS=6,ROWS=14,RECOG_ROW=5,RECOG_HEIGHT=2;
var SPEED_MAP={1:1200,2:900,3:700,4:500,5:350},SPEED_NAMES={1:'很慢',2:'慢',3:'中',4:'快',5:'很快'};
var gameSettings={speed:3,mode:'both',charRange:'mastered',timeout:5};
var canvas,ctx,canvasW=0,canvasH=0,cellW=0,cellH=0;
var grid=[],fallingChar=null,gameState='IDLE';
var score=0,eliminated=0,stackedCount=0,totalProcessed=0;
var animFrameId=null,lastDropTime=0,lastFrameTime=0;
var recognizer=null,_timerInterval=null,_safetyTimer=null,_recMatchCount=0;
var writeCharData=null,writeWriter=null;
var charQueue=[],currentProfile=null,currentUser='';
var gameResultSaved=false,droppedChars=[];

// ============================================
// 初始化
// ============================================
function initGame(){
  canvas=document.getElementById('gameCanvas');
  ctx=canvas.getContext('2d');
  loadUserAndProfile();loadSettings();initGrid();resizeCanvas();
  buildCharQueue();startFalling();
  lastFrameTime=performance.now();lastDropTime=lastFrameTime;
  animFrameId=requestAnimationFrame(gameLoop);
}

function loadUserAndProfile(){
  try{
    var data=JSON.parse(localStorage.getItem('learningProfiles')||'[]');
    var params=new URLSearchParams(window.location.search);
    currentUser=params.get('user')||'';
    if(!currentUser&&data.length>0){currentUser=data[0].name}
    for(var i=0;i<data.length;i++){if(data[i].todayState){currentUser=data[i].name;break}}
    if(!currentUser&&data.length>0)currentUser=data[0].name;
    currentProfile=data.find(function(p){return p.name===currentUser})||data[0];
    if(currentProfile)currentUser=currentProfile.name;
  }catch(e){currentProfile=null;currentUser='';}
}

function loadSettings(){
  try{var s=JSON.parse(localStorage.getItem('tetrisSettings')||'{}');Object.assign(gameSettings,s);document.getElementById('setSpeed').value=s.speed||3;document.getElementById('setMode').value=s.mode||'both';document.getElementById('setRange').value=s.charRange||'mastered';document.getElementById('setTimeout').value=s.timeout||5;updateSettingDisplay('speed');}catch(e){}
}

function saveSettingsToStorage(){localStorage.setItem('tetrisSettings',JSON.stringify(gameSettings));}
function initGrid(){grid=[];for(var c=0;c<COLS;c++){grid[c]=[];for(var r=0;r<ROWS;r++){grid[c][r]=null}}}

function resizeCanvas(){
  var w=window.innerWidth-8,topH=document.getElementById('topBar').offsetHeight||44;
  var ctrlH=document.getElementById('controls').offsetHeight||70;
  var h=window.innerHeight-topH-ctrlH-8;
  var aspect=COLS/ROWS;
  var maxW=h*aspect*0.9;if(maxW<w)w=Math.floor(maxW);
  var dpr=Math.min(window.devicePixelRatio||1,2);
  canvasW=w;canvasH=Math.floor(w/aspect);
  // 画布高度占视口 ~88%
  canvasH=Math.min(canvasH,Math.round(window.innerHeight*0.88));
  canvas.width=canvasW*dpr;canvas.height=canvasH*dpr;
  canvas.style.width=canvasW+'px';canvas.style.height=canvasH+'px';
  ctx.scale(dpr,dpr);
  cellW=Math.floor(canvasW/COLS);cellH=Math.floor(canvasH/ROWS);
}

// ============================================
// 字符队列
// ============================================
function buildCharQueue(){
  charQueue=[];
  var p=currentProfile;if(!p||!p.learnedChars){charQueue='人大小上山下水火月日'.split('');return}
  var learned=p.learnedChars,cands=[],range=gameSettings.charRange;
  for(var ch in learned){
    if(range==='mastered'&&learned[ch].score>=80)cands.push(ch);
    else if(range==='weak'&&learned[ch].score<60)cands.push(ch);
    else if(range==='all')cands.push(ch);
  }
  if(cands.length===0){for(var ch in learned)cands.push(ch)}
  if(cands.length===0){charQueue='人大小上山下水火月日'.split('');return}
  for(var i=cands.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cands[i];cands[i]=cands[j];cands[j]=t}
  charQueue=cands;
}

// ============================================
// 游戏循环
// ============================================
function gameLoop(timestamp){
  var dt=timestamp-lastFrameTime;lastFrameTime=timestamp;
  if(gameState==='FALLING'&&fallingChar){
    var spd=SPEED_MAP[gameSettings.speed]||700;
    if(timestamp-lastDropTime>=spd){lastDropTime=timestamp;dropCharOneRow();}
  }
  drawGame();animFrameId=requestAnimationFrame(gameLoop);
}

// ============================================
// 掉落
// ============================================
function startFalling(){
  if(gameState==='GAME_OVER')return;
  if(charQueue.length===0)buildCharQueue();
  if(charQueue.length===0){endGame();return}
  var ch=charQueue.shift(),col=Math.floor(Math.random()*COLS);
  if(grid[col][0]!==null){endGame();return}
  fallingChar={char:ch,col:col,row:0,pinyin:PINYIN[ch]||''};
  gameState='FALLING';totalProcessed++;
  document.getElementById('recogHint').classList.remove('active');
}

function dropCharOneRow(){
  if(!fallingChar)return;
  var nr=fallingChar.row+1;
  if(fallingChar.row>=RECOG_ROW&&fallingChar.row<RECOG_ROW+RECOG_HEIGHT){startRecognition();return}
  if(nr>=ROWS||grid[fallingChar.col][nr]!==null){stackChar(fallingChar);return}
  fallingChar.row=nr;
}

function dropNow(){
  if(gameState!=='FALLING'||!fallingChar)return;
  while(fallingChar&&gameState==='FALLING'){
    var nr=fallingChar.row+1;
    if(nr>=ROWS||grid[fallingChar.col][nr]!==null){stackChar(fallingChar);return}
    if(fallingChar.row>=RECOG_ROW){startRecognition();return}
    fallingChar.row=nr;
  }
}

function moveLeft(){
  if(gameState!=='FALLING'||!fallingChar)return;
  var nc=fallingChar.col-1;if(nc<0||grid[nc][fallingChar.row]!==null)return;
  fallingChar.col=nc;
}

function moveRight(){
  if(gameState!=='FALLING'||!fallingChar)return;
  var nc=fallingChar.col+1;if(nc>=COLS||grid[nc][fallingChar.row]!==null)return;
  fallingChar.col=nc;
}

// ============================================
// 语音识别（复用测验页方案：per-char recognizer, continuous:false, maxAlternatives:8）
// ============================================
function startRecognition(){
  if(!fallingChar)return;
  gameState='RECOGNIZING';document.getElementById('recogHint').classList.add('active');
  var ch=fallingChar.char,py=formatPinyin(fallingChar.pinyin||'');
  document.getElementById('voiceChar').textContent=ch;
  document.getElementById('voiceResult').innerHTML='';
  document.getElementById('voiceHint').textContent='点击🎤开始朗读';
  document.getElementById('voiceStatus').textContent='点击麦克风开始';
  document.getElementById('micIcon').className='mic-icon';
  document.getElementById('micIcon').onclick=startVoiceRecognition;
  document.getElementById('voiceTimer').style.display='none';
  document.getElementById('voiceSkipBtn').style.display='block';
  document.getElementById('voiceOverlay').classList.add('visible');
  if(recognizer){onVoiceRecognizerReady();}
}

function onVoiceRecognizerReady(){
  document.getElementById('micIcon').className='mic-icon listening';
  document.getElementById('micIcon').onclick=null;
  document.getElementById('voiceHint').textContent='正在听...';
  document.getElementById('voiceStatus').textContent='🎤 请朗读...';
  document.getElementById('voiceTimer').style.display='block';
  document.getElementById('voiceTimer').textContent=gameSettings.timeout;
  if(_timerInterval){clearInterval(_timerInterval);}
  var t=gameSettings.timeout;
  _timerInterval=setInterval(function(){
    t--;document.getElementById('voiceTimer').textContent=Math.max(0,t);
    if(t<=0&&gameState==='RECOGNIZING'){clearInterval(_timerInterval);onVoiceTimeout();}
  },1000);
}

function startVoiceRecognition(){
  if(gameState!=='RECOGNIZING')return;

  var ch=document.getElementById('voiceChar').textContent;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('voiceStatus').textContent='⚠️ 不支持语音';setTimeout(function(){if(gameState==='RECOGNIZING')onVoiceTimeout();},1500);return}

  // 如果已有识别器且 _recMatchCount 没到阈值，直接激活
  // 整个游戏只创建 1 个 SR 实例，避免 iOS 实例上限
  if(recognizer && _recMatchCount<4){
    onVoiceRecognizerReady();
    return;
  }

  // 每 4 次匹配后：abort+start 同一实例，冲掉累积结果
  if(recognizer && _recMatchCount>=4){
    _recMatchCount=0;
    try{recognizer.abort()}catch(e){}
    // 等 200ms 再 start，确保 iOS 释放资源
    document.getElementById('voiceStatus').textContent='刷新中...';
    setTimeout(function(){
      if(gameState!=='RECOGNIZING'||!recognizer)return;
      onVoiceRecognizerReady();
      try{recognizer.start()}catch(e){}
      onVoiceRecognizerReady();
    },200);
    return;
  }

  // 首次：创建持续识别器
  // 首次创建 SR
  _recMatchCount=0;
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}

  try{
    recognizer=new SR();
    recognizer.lang='zh-CN';
    recognizer.continuous=true;
    recognizer.interimResults=true;
    recognizer.maxAlternatives=8;

    recognizer.onstart=function(){onVoiceRecognizerReady();};

    recognizer.onresult=function(e){
      if(gameState!=='RECOGNIZING')return;
      // 只处理新增结果（resultIndex 跳跃）
      for(var i=e.resultIndex;i<e.results.length;i++){
        for(var j=0;j<e.results[i].length;j++){
          var spoken=e.results[i][j].transcript.trim();
          var ch=document.getElementById('voiceChar').textContent;
          if(charMatch(ch,spoken)){
            _recMatchCount++;
            if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
            document.getElementById('voiceResult').innerHTML='<div class="result-correct">✓ 正确！</div>';
            document.getElementById('micIcon').className='mic-icon';
            score+=10;eliminated++;updateStats();
            var fwX=fallingChar.col*cellW+cellW/2,fwY=fallingChar.row*cellH+cellH/2;
            setTimeout(function(){
              document.getElementById('voiceOverlay').classList.remove('visible');
              document.getElementById('recogHint').classList.remove('active');
              if(gameState!=='RECOGNIZING')return;
              gameState='SUCCESS';
              if(gameSettings.mode==='both')startWritingBonus(ch);else{triggerFirework(fwX,fwY,false);spawnNext();}
            },600);
            return;
          }
        }
      }
    };

    recognizer.onerror=function(e){
      if(e.error==='not-allowed'||e.error==='service-not-allowed'){
        document.getElementById('voiceStatus').textContent='⚠️ 请允许麦克风';
        return;
      }
    };

    recognizer.onend=function(){};

    recognizer.start();
  }catch(e){
    document.getElementById('voiceStatus').textContent='⚠️ 启动失败';
    recognizer=null;
    setTimeout(function(){if(gameState==='RECOGNIZING')onVoiceTimeout();},1000);
  }
}

function charMatch(target,text){
  if(!target||!text)return false;
  if(text.indexOf(target)>=0)return true;
  var tPy=PINYIN[target];
  if(!tPy)return false;
  var chars=text.match(/[\u4e00-\u9fff]/g);
  if(!chars)return false;
  var tPyBase=tPy.replace(/\d/g,'');
  for(var i=0;i<chars.length;i++){
    var rPy=PINYIN[chars[i]];
    if(rPy&&rPy.replace(/\d/g,'')===tPyBase)return true;
  }
  return false;
}

function skipVoice(){
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
  document.getElementById('voiceOverlay').classList.remove('visible');
  document.getElementById('micIcon').className='mic-icon';
  document.getElementById('recogHint').classList.remove('active');
  if(gameState!=='RECOGNIZING'||!fallingChar)return;
  stackChar(fallingChar);
}

// ============================================
// 堆叠
// ============================================
function stackChar(cd){
  if(!cd)return;
  var col=cd.col,tr=ROWS-1;
  for(var r=Math.min(cd.row,ROWS-1);r<ROWS;r++){if(grid[col][r]!==null){tr=r-1;break}}
  if(tr<0){endGame();return}
  grid[col][tr]={char:cd.char,type:'stacked'};
  droppedChars.push(cd.char);stackedCount++;updateStats();
  triggerDust(col*cellW+cellW/2,tr*cellH+cellH/2);triggerScreenShake(4);
  for(var c=0;c<COLS;c++){if(grid[c][0]!==null){endGame();return}}
  fallingChar=null;gameState='FAIL';
  setTimeout(spawnNext,300);
}

// ============================================
// 书写加分：先演示笔顺，再让小朋友自己写
// 1) animateCharacter 演示一遍
// 2) 自动进入 quiz 模式
// 3) 用户提交后，错误笔数 ≤ 2 才 +5 分
// ============================================
var _writeMisses=0;
var _writeSubmitted=false;
var _writeScored=false;

function startWritingBonus(ch){
  gameState='WRITING';writeCharData=ch;
  _writeMisses=0;_writeSubmitted=false;_writeScored=false;
  document.getElementById('writeChar').textContent=ch;
  document.getElementById('writeResult').innerHTML='<div style="color:#667eea;font-size:.95em">🎬 笔顺演示中…请认真观看</div>';
  var cb=document.getElementById('writeConfirmBtn');
  cb.style.display='none';
  cb.className='write-btn confirm';cb.disabled=false;cb.textContent='✍️ 我写完了';
  document.getElementById('writeDoneBtn').style.display='none';
  document.getElementById('writingOverlay').classList.add('visible');
  setTimeout(function(){
    var ct=document.getElementById('writeCanvas');ct.innerHTML='';
    try{
      if(writeWriter){try{writeWriter.cancelQuiz()}catch(e){}writeWriter=null}
      writeWriter=HanziWriter.create(ct,ch,{
        width:200,height:200,padding:10,
        strokeColor:'#333',outlineColor:'#ddd',
        drawingColor:'#a18cd1',highlightColor:'#667eea',
        showOutline:true,showHintAfterMisses:2,
        onMistake:function(){_writeMisses++;}
      });
      // 第 1 步：演示笔顺
      writeWriter.animateCharacter({
        onComplete:function(){
          // 第 2 步：演示完，立刻开启 quiz 模式
          document.getElementById('writeResult').innerHTML='<div style="color:#e67e22;font-size:1em;font-weight:bold">✍️ 轮到你写啦！</div>';
          cb.style.display='inline-block';
          cb.disabled=true;cb.textContent='书写中…';
          setTimeout(function(){
            try{
              writeWriter.quiz({
                onCorrectStroke:function(){},
                onMistake:function(){_writeMisses++;},
                onComplete:function(){
                  _writeSubmitted=true;
                  cb.disabled=false;cb.textContent='✓ 提交';
                }
              });
            }catch(e){
              cb.disabled=false;cb.textContent='✍️ 我写完了';
            }
          },300);
        }
      });
    }catch(e){
      ct.innerHTML='<div style="color:#999;padding:80px 0">暂不支持</div>';
      cb.style.display='inline-block';cb.disabled=false;cb.textContent='✍️ 我写完了';
    }
  },100);
}

// 用户点击"我写完了"时，提交并判定
function submitWriting(){
  if(!writeCharData)return;
  if(!_writeSubmitted){
    // 还没走完 HanziWriter 检测：可能是没写完，也可能是漏判
    // 兜底策略：错笔数 ≤ 2 且至少有一次书写（_writeMisses >= 0）算通过
    if(_writeMisses<=2){
      finalizeWriting(true,'✓ 书写正确 +5分！');
    }else{
      finalizeWriting(false,'笔画有 '+_writeMisses+' 处错误，再仔细一点！');
    }
    return;
  }
  // 走完 HanziWriter 的 onComplete
  if(_writeMisses<=2){
    finalizeWriting(true,'✓ 书写正确 +5分！');
  }else{
    finalizeWriting(false,'笔画有 '+_writeMisses+' 处错误，再仔细一点！');
  }
}

function finalizeWriting(success,msg){
  _writeScored=success;
  if(success){
    score+=5;updateStats();
    if(fallingChar){
      var fx=fallingChar.col*cellW+cellW/2,fy=fallingChar.row*cellH+cellH/2;
      triggerFirework(fx,fy,true);
    }
  }
  document.getElementById('writeResult').innerHTML=
    '<div style="color:'+(success?'#2ecc71':'#e74c3c')+';font-size:1em;font-weight:bold">'+msg+'</div>';
  var cb=document.getElementById('writeConfirmBtn');cb.style.display='none';
  var db=document.getElementById('writeDoneBtn');
  db.textContent=success?'继续游戏 +5分':'继续游戏（不得分）';
  db.className='write-btn '+(success?'bonus-result earned':'bonus-result missed');
  db.style.display='inline-block';
  if(writeWriter){try{writeWriter.cancelQuiz()}catch(e){}}
}

function skipWriting(){
  if(writeWriter){try{writeWriter.cancelQuiz()}catch(e){}writeWriter=null}
  document.getElementById('writingOverlay').classList.remove('visible');
  var shouldStack=fallingChar;
  writeCharData=null;_writeMisses=0;_writeSubmitted=false;_writeScored=false;
  if(shouldStack){stackChar(fallingChar);}else{spawnNext();}
}

function closeWritingAndContinue(){
  if(writeWriter){try{writeWriter.cancelQuiz()}catch(e){}writeWriter=null}
  document.getElementById('writingOverlay').classList.remove('visible');
  var shouldStack=!_writeScored&&fallingChar;
  writeCharData=null;_writeMisses=0;_writeSubmitted=false;_writeScored=false;
  if(shouldStack){stackChar(fallingChar);}else{spawnNext();}
}

function onVoiceTimeout(){
  document.getElementById('micIcon').className='mic-icon';
  document.getElementById('voiceTimer').textContent='⏰';
  setTimeout(function(){
    document.getElementById('voiceOverlay').classList.remove('visible');
    document.getElementById('recogHint').classList.remove('active');
    if(gameState!=='RECOGNIZING'||!fallingChar)return;
    stackChar(fallingChar);
  },400);
}

function spawnNext(){fallingChar=null;lastDropTime=performance.now();startFalling();}

// ============================================
// 结束
// ============================================
function endGame(){
  gameState='GAME_OVER';if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
  if(recognizer){try{recognizer.abort()}catch(e){}recognizer=null;}
  document.getElementById('voiceOverlay').classList.remove('visible');
  document.getElementById('writingOverlay').classList.remove('visible');
  document.getElementById('goScore').textContent=score;
  document.getElementById('goElim').textContent=eliminated;
  document.getElementById('goStacked').textContent=stackedCount;
  document.getElementById('goUser').textContent=currentUser||'小朋友';
  document.getElementById('goWeak').textContent=droppedChars.length?'需复习：'+[...new Set(droppedChars)].join('、'):'全部答对，太棒了！';
  document.getElementById('gameOverOverlay').classList.add('visible');
  saveGameResults();
}

function saveGameResults(){
  if(gameResultSaved)return;gameResultSaved=true;
  try{
    var d=JSON.parse(localStorage.getItem('learningProfiles')||'[]'),p=d.find(function(x){return x.name===currentUser});
    if(!p)return;
    if(!p.gameRecords)p.gameRecords=[];
    p.gameRecords.push({date:new Date().toISOString().slice(0,10),score:score,eliminated:eliminated,stacked:stackedCount,weakChars:[...new Set(droppedChars)]});
    var learned=p.learnedChars||{};
    for(var i=0;i<droppedChars.length;i++){
      var ch=droppedChars[i];
      if(learned[ch]){var cs=learned[ch].score;learned[ch].score=Math.max(cs-5,30);learned[ch].practiceScore=Math.min(learned[ch].practiceScore||100,cs-5)}
    }
    localStorage.setItem('learningProfiles',JSON.stringify(d));
  }catch(e){}
}

// ============================================
// 粒子特效系统
// ============================================
var particles=[];
var screenShake={intensity:0,decay:0.85};

function Particle(x,y,color,vx,vy,size,life,gravity){
  this.x=x;this.y=y;this.color=color;this.vx=vx;this.vy=vy;
  this.size=size;this.life=life;this.maxLife=life;this.gravity=gravity||0.15;
}
Particle.prototype.update=function(){
  this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;
  this.life--;this.size*=0.98;
};
Particle.prototype.draw=function(c){
  var a=this.life/this.maxLife;c.globalAlpha=a;
  c.fillStyle=this.color;c.beginPath();
  c.arc(this.x,this.y,Math.max(0.5,this.size),0,Math.PI*2);c.fill();
  c.globalAlpha=1;
};

function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}
}
function drawParticles(c){
  for(var i=0;i<particles.length;i++)particles[i].draw(c);
}

function triggerFirework(x,y,big){
  var cnt=big?60:35,colors=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#ff9f43','#1dd1a1'];
  for(var i=0;i<cnt;i++){
    var ang=(Math.PI*2*i)/cnt+(Math.random()-0.5)*0.8;
    var sp=Math.random()*4.5+2.5,col=colors[Math.floor(Math.random()*colors.length)];
    var sz=Math.random()*4+3,lf=Math.random()*50+60;
    particles.push(new Particle(x,y,col,Math.cos(ang)*sp,Math.sin(ang)*sp,sz,lf));
  }
  for(var i=0;i<12;i++){
    var ang=Math.random()*Math.PI*2,sp=Math.random()*6+3;
    particles.push(new Particle(x,y,'#fff',Math.cos(ang)*sp,Math.sin(ang)*sp,3,30));
  }
}

function triggerDust(x,y){
  for(var i=0;i<18;i++){
    var ang=Math.PI+(Math.random()-0.5)*1.5;
    var sp=Math.random()*2+0.5,sz=Math.random()*5+2,lf=Math.random()*18+12;
    particles.push(new Particle(x,y,'rgba(140,130,120,0.6)',Math.cos(ang)*sp,Math.sin(ang)*sp-1.2,sz,lf,0.08));
  }
}

function triggerScreenShake(intensity){
  screenShake.intensity=intensity||5;
}

// ============================================
// 绘制（无网格线、无虚线框、柔和配色）
// ============================================
function drawGame(){
  ctx.clearRect(0,0,canvasW,canvasH);
  // 背景
  var grad=ctx.createLinearGradient(0,0,0,canvasH);
  grad.addColorStop(0,'#f0f4ff');grad.addColorStop(0.45,'#fdf6f0');grad.addColorStop(1,'#fff5f5');
  ctx.fillStyle=grad;ctx.fillRect(0,0,canvasW,canvasH);

  // 识别区（极淡的半透明带）
  var ry=RECOG_ROW*cellH,rh=RECOG_HEIGHT*cellH;
  ctx.fillStyle='rgba(161,140,209,0.08)';
  ctx.fillRect(0,ry,canvasW,rh);

  // 堆叠字符（柔和的颜色）
  for(var c=0;c<COLS;c++){for(var r=0;r<ROWS;r++){var cell=grid[c][r];if(cell)drawCharCell(c,r,cell.char,'#fff0f0','#c0392b');}}

  // 下落字符（只画文字，无背景色、无发光）
  if(fallingChar&&(gameState==='FALLING'||gameState==='RECOGNIZING')){
    var x=fallingChar.col*cellW+cellW/2,y=fallingChar.row*cellH+cellH/2;
    ctx.font='bold '+Math.max(22,Math.round(cellW*0.6))+'px system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#333';ctx.fillText(fallingChar.char,x,y);
  }
}

function drawCharCell(col,row,char,bgColor,textColor,glow){
  var x=col*cellW,y=row*cellH,pad=Math.max(2,Math.round(cellW*0.06)),r=Math.max(4,Math.round(cellW*0.1));
  if(glow){ctx.shadowColor='rgba(161,140,209,0.4)';ctx.shadowBlur=12}
  ctx.fillStyle=bgColor;
  ctx.beginPath();
  ctx.moveTo(x+pad+r,y+pad);ctx.lineTo(x+cellW-pad-r,y+pad);
  ctx.quadraticCurveTo(x+cellW-pad,y+pad,x+cellW-pad,y+pad+r);
  ctx.lineTo(x+cellW-pad,y+cellH-pad-r);ctx.quadraticCurveTo(x+cellW-pad,y+cellH-pad,x+cellW-pad-r,y+cellH-pad);
  ctx.lineTo(x+pad+r,y+cellH-pad);ctx.quadraticCurveTo(x+pad,y+cellH-pad,x+pad,y+cellH-pad-r);
  ctx.lineTo(x+pad,y+pad+r);ctx.quadraticCurveTo(x+pad,y+pad,x+pad+r,y+pad);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.shadowColor='transparent';
  ctx.fillStyle=textColor;
  var fs=Math.max(20,Math.round(cellW*0.55));ctx.font='bold '+fs+'px system-ui';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(char,x+cellW/2,y+cellH/2+1);
}

// ============================================
// UI
// ============================================
function updateStats(){document.getElementById('elimCount').textContent=eliminated;document.getElementById('scoreCount').textContent=score;document.getElementById('stackedCount').textContent=stackedCount;}
function updateSettingDisplay(t){if(t==='speed'){var v=parseInt(document.getElementById('setSpeed').value);document.getElementById('setSpeedVal').textContent=SPEED_NAMES[v]||'中'}}
function openSettings(){document.getElementById('settingsOverlay').classList.add('visible')}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('visible')}
function saveSettings(){gameSettings.speed=parseInt(document.getElementById('setSpeed').value);gameSettings.mode=document.getElementById('setMode').value;gameSettings.charRange=document.getElementById('setRange').value;gameSettings.timeout=parseInt(document.getElementById('setTimeout').value);saveSettingsToStorage();closeSettings();}

function restartGame(){
  document.getElementById('gameOverOverlay').classList.remove('visible');
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null}
  score=0;eliminated=0;stackedCount=0;totalProcessed=0;droppedChars=[];fallingChar=null;gameState='IDLE';gameResultSaved=false;_recMatchCount=0;
  initGrid();buildCharQueue();updateStats();startFalling();
  lastFrameTime=performance.now();lastDropTime=lastFrameTime;animFrameId=requestAnimationFrame(gameLoop);
}

function backToDashboard(){
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null}
  if(recognizer){try{recognizer.abort()}catch(e){}recognizer=null}
  if(writeWriter){try{writeWriter.cancelQuiz()}catch(e){}writeWriter=null}
  window.location.href='index.html';
}

window.addEventListener('resize',function(){clearTimeout(this._rt);this._rt=setTimeout(resizeCanvas,200)});
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')moveLeft();else if(e.key==='ArrowRight')moveRight();else if(e.key==='ArrowDown')dropNow();});
window.addEventListener('load',function(){setTimeout(initGame,50)});
